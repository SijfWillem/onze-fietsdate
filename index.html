<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Onze fietsdate 🚲❤️</title>

  <!-- Leaflet CSS (CDN, HTTPS, no API key) -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />

  <!-- Hinge-style: modern geometric sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #F3EEF4;   /* soft warm lavender-white */
      --bg-2:      #EADFEC;
      --card:      #FFFFFF;
      --plum:      #4B164C;   /* Hinge eggplant */
      --plum-2:    #6E2A6F;
      --rose:      #E15B7E;   /* accent for the "like" */
      --ink:       #29152B;
      --muted:     #8C7C8E;
      --line:      #ECE2ED;
      --shadow:    rgba(75, 22, 76, 0.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    body { overscroll-behavior: none; }

    /* ============================================================
       PART 0 — HINGE SPLASH + SWIPEABLE PROFILE
       ============================================================ */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      transition: opacity .7s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: min(58vw, 290px);
      height: auto;
      animation: logoIn 1s cubic-bezier(.2,.8,.2,1) both;
    }
    .splash-tag {
      margin-top: 6px;
      color: #7a7a7a;
      font-size: .95rem;
      font-weight: 500;
      opacity: 0;
      animation: fadeIn .8s ease .5s both;
    }
    @keyframes logoIn { from { opacity: 0; transform: scale(.86); } to { opacity: 1; transform: scale(1); } }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ---- Your Profile (Juliah) — the opener ---- */
    #yourprofile {
      position: fixed;
      inset: 0;
      z-index: 45;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 18px;
      background: radial-gradient(120% 90% at 50% 0%, var(--bg) 0%, var(--bg-2) 100%);
      transition: opacity .6s ease;
    }
    #yourprofile.hide { opacity: 0; pointer-events: none; }
    .yp-head {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--plum);
    }
    .yp-card { cursor: pointer; }
    .yp-start {
      border: none;
      border-radius: 999px;
      background: var(--plum);
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      font-size: 1.15rem;
      padding: 16px 44px;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(75,22,76,.32);
      animation: jaPulse 1.7s ease-in-out infinite;
      transition: transform .15s ease;
    }
    .yp-start:active { transform: scale(.94); }

    #profile {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 18px;
      background: radial-gradient(120% 90% at 50% 0%, var(--bg) 0%, var(--bg-2) 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .6s ease;
    }
    #profile.show { opacity: 1; pointer-events: auto; }
    #profile.hide { opacity: 0; pointer-events: none; }

    .ph-hint { font-size: .9rem; font-weight: 600; color: var(--muted); text-align: center; min-height: 1.2em; }

    .ph-deck { position: relative; width: 100%; max-width: 380px; }

    .ph-card {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 26px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 24px 60px var(--shadow);
      touch-action: pan-y;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      will-change: transform;
    }
    .ph-card:active { cursor: grabbing; }
    .ph-photo {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 35%;
      image-orientation: from-image;
      pointer-events: none;
    }

    .ph-segs { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 3; display: flex; gap: 5px; pointer-events: none; }
    .ph-segs > div { flex: 1; height: 3.5px; border-radius: 99px; background: rgba(255,255,255,.35); }
    .ph-segs > div.on { background: #fff; }

    .ph-info {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 2;
      padding: 56px 22px 20px;
      color: #fff; text-align: left;
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.78));
      pointer-events: none;
    }
    .ph-name { font-size: 1.85rem; font-weight: 800; letter-spacing: -.02em; }
    .ph-bio  { font-size: 1rem; font-weight: 500; opacity: .95; margin-top: 4px; line-height: 1.35; }

    .ph-stamp {
      position: absolute; top: 24px; z-index: 4;
      font-weight: 900; font-size: 1.6rem; letter-spacing: .08em;
      padding: 6px 14px; border-radius: 10px; border: 3px solid;
      opacity: 0; pointer-events: none;
    }
    .ph-stamp.like { left: 20px; color: #2ec27e; border-color: #2ec27e; transform: rotate(-14deg); }
    .ph-stamp.nope { right: 20px; color: #ff5d6c; border-color: #ff5d6c; transform: rotate(14deg); }

    .ph-actions { display: flex; gap: 26px; }
    .ph-btn {
      width: 64px; height: 64px; border-radius: 50%;
      border: none; cursor: pointer; font-family: inherit;
      font-size: 1.7rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      background: #fff; box-shadow: 0 10px 24px var(--shadow);
      transition: transform .15s ease;
    }
    .ph-btn:active { transform: scale(.9); }
    .ph-btn.btn-nope { color: #ff5d6c; }
    .ph-btn.btn-yes  { color: #2ec27e; font-size: 1.9rem; }

    /* ============================================================
       PART 0.5 — MATCH + CHAT (Hinge-style)
       ============================================================ */
    #match {
      position: fixed; inset: 0; z-index: 30;
      display: flex; align-items: center; justify-content: center;
      padding: 28px;
      background: linear-gradient(165deg, var(--plum) 0%, var(--plum-2) 48%, var(--rose) 100%);
      opacity: 0; pointer-events: none;
      transition: opacity .6s ease;
    }
    #match.show { opacity: 1; pointer-events: auto; }
    #match.hide { opacity: 0; pointer-events: none; }
    .match-inner {
      text-align: center; color: #fff;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    .match-avatars { position: relative; height: 128px; width: 210px; margin-bottom: 4px; }
    .match-av {
      position: absolute; top: 4px;
      width: 120px; height: 120px; border-radius: 50%;
      object-fit: cover; border: 4px solid #fff;
      box-shadow: 0 12px 30px rgba(0,0,0,.32);
      image-orientation: from-image;
    }
    .match-av.a1 { left: 0;  transform: rotate(-6deg); object-position: center 30%; }
    .match-av.a2 { right: 0; transform: rotate(6deg);  object-position: center 30%; }
    .match-title { font-size: clamp(1.7rem, 7vw, 2.1rem); font-weight: 800; letter-spacing: -.02em; }
    .match-sub   { font-size: 1.05rem; font-weight: 500; opacity: .92; }
    .match-btn {
      margin-top: 14px; border: none; border-radius: 999px;
      background: #fff; color: var(--plum);
      font-family: inherit; font-weight: 800; font-size: 1.1rem;
      padding: 16px 40px; cursor: pointer;
      box-shadow: 0 14px 30px rgba(0,0,0,.28);
      animation: jaPulse 1.7s ease-in-out infinite;
      transition: transform .15s ease;
    }
    .match-btn:active { transform: scale(.94); }

    #chat {
      position: fixed; inset: 0; z-index: 35;
      display: flex; flex-direction: column;
      background: #fff;
      opacity: 0; pointer-events: none;
      transition: opacity .5s ease;
    }
    #chat.show { opacity: 1; pointer-events: auto; }
    #chat.hide { opacity: 0; pointer-events: none; }

    .chat-header { padding-top: calc(8px + env(safe-area-inset-top)); border-bottom: 1px solid var(--line); background: #fff; }
    .chat-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px 10px; }
    .chat-back { font-size: 1.7rem; color: var(--ink); width: 28px; }
    .chat-title { font-size: 1.4rem; font-weight: 800; color: var(--ink); }
    .chat-menu { font-size: 1.5rem; color: var(--ink); width: 28px; text-align: right; }
    .chat-tabs { display: flex; }
    .chat-tab { flex: 1; text-align: center; padding: 10px 0 12px; font-weight: 700; font-size: 1rem; color: var(--muted); }
    .chat-tab.active { color: var(--plum); box-shadow: inset 0 -2.5px 0 var(--plum); }
    .chat-tab-sep { width: 1px; background: var(--line); margin: 9px 0; transform: skewX(-12deg); }

    .chat-scroll { flex: 1; overflow-y: auto; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 10px; background: #fff; }
    .chat-date { text-align: center; color: var(--muted); font-size: .85rem; font-weight: 600; margin: 6px 0 2px; }
    .chat-date span { font-weight: 500; opacity: .8; }

    .chat-prompt-wrap { display: flex; flex-direction: column; }
    .chat-prompt { background: #ededed; border-radius: 22px; padding: 20px 22px 30px; }
    .chat-prompt-label { font-size: .95rem; color: #4a4a4a; margin-bottom: 10px; }
    .chat-prompt-text { font-family: Georgia, 'Times New Roman', serif; font-size: clamp(1.5rem, 6.6vw, 1.85rem); font-weight: 700; line-height: 1.12; color: #111; }
    .chat-reply {
      align-self: flex-start; margin-top: -16px; margin-left: 6px;
      background: #ededed; color: #1d1d1f;
      padding: 12px 18px; border-radius: 20px 20px 20px 6px;
      font-size: 1.05rem; box-shadow: 0 4px 12px rgba(0,0,0,.07); z-index: 2;
    }

    .chat-row { display: flex; align-items: flex-end; gap: 8px; }
    .chat-row.right { justify-content: flex-end; }
    .chat-row.left  { justify-content: flex-start; }
    .chat-bubble { max-width: 76%; padding: 13px 18px; border-radius: 22px; font-size: 1.05rem; line-height: 1.3; }
    .chat-bubble.grey { background: #ededed; color: #1d1d1f; border-bottom-left-radius: 8px; }
    .chat-bubble.sent { background: var(--plum); color: #fff; border-bottom-right-radius: 8px; }
    .chat-bubble.indent { margin-left: 42px; }
    .chat-av { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; image-orientation: from-image; flex: none; }
    .chat-av-spacer { width: 34px; flex: none; }
    .chat-sent-label { font-size: .78rem; color: var(--muted); margin: 4px 4px 0 0; }
    .chat-bubble u { text-decoration: underline; }
    .chat-hint { text-align: center; color: var(--muted); font-size: .9rem; margin: 10px 0; }

    .chat-continue {
      align-self: center; margin: 8px 0 6px; border: none; border-radius: 999px;
      background: var(--plum); color: #fff; font-family: inherit; font-weight: 800; font-size: 1.05rem;
      padding: 14px 30px; cursor: pointer; box-shadow: 0 12px 26px rgba(75,22,76,.32);
      animation: jaPulse 1.7s ease-in-out infinite; transition: transform .15s ease;
    }
    .chat-continue:active { transform: scale(.95); }

    .chat-input { display: flex; align-items: center; gap: 10px; padding: 10px 14px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); background: #fff; }
    .chat-input-pill { flex: 1; border: 1.5px solid var(--line); border-radius: 999px; padding: 14px 20px; color: var(--muted); font-size: 1rem; }
    .chat-input-mic { width: 44px; height: 44px; border-radius: 50%; background: #f1eef2; display: flex; align-items: center; justify-content: center; color: var(--plum); flex: none; }

    /* typing-style one-by-one reveal */
    .chat-rev { opacity: 0; transform: translateY(10px); transition: opacity .4s ease, transform .4s ease; }
    .chat-rev.in { opacity: 1; transform: none; }

    /* little "typing…" indicator shown before each incoming message */
    .chat-typing {
      align-self: flex-start; display: none; align-items: center; gap: 4px;
      background: #ededed; border-radius: 20px; padding: 14px 16px; margin-left: 42px;
    }
    .chat-typing.show { display: inline-flex; }
    .chat-typing i { width: 7px; height: 7px; border-radius: 50%; background: #b3b3b3; animation: typeBounce 1.2s infinite ease-in-out; }
    .chat-typing i:nth-child(2) { animation-delay: .2s; }
    .chat-typing i:nth-child(3) { animation-delay: .4s; }
    @keyframes typeBounce { 0%, 60%, 100% { transform: translateY(0); opacity: .5; } 30% { transform: translateY(-5px); opacity: 1; } }

    /* ============================================================
       PART 1 — QUESTIONNAIRE (Hinge-style profile card)
       ============================================================ */
    #quiz {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: radial-gradient(120% 90% at 50% 0%, var(--bg) 0%, var(--bg-2) 100%);
      transition: opacity .8s ease, transform .8s ease;
      z-index: 10;
      overflow: hidden;
    }
    #quiz.leaving { opacity: 0; transform: scale(1.04); pointer-events: none; }

    /* floating hearts layer (subtle) */
    #hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart {
      position: absolute;
      bottom: -40px;
      font-size: 24px;
      opacity: 0;
      animation: floatUp linear infinite;
      will-change: transform, opacity;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 0; }
      10%  { opacity: .55; }
      90%  { opacity: .55; }
      100% { transform: translateY(-115vh) rotate(40deg) scale(1.1); opacity: 0; }
    }

    .quiz-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* the Hinge "prompt" card */
    .card {
      width: 100%;
      background: var(--card);
      border-radius: 28px;
      padding: 38px 30px 34px;
      box-shadow: 0 24px 60px var(--shadow), 0 2px 8px rgba(75,22,76,.06);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* progress dots */
    .dots { display: flex; gap: 8px; margin-bottom: 26px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--line);
      transition: background .3s ease, transform .3s ease, width .3s ease;
    }
    .dot.active { background: var(--plum); width: 22px; border-radius: 99px; }
    .dot.done   { background: var(--rose); }

    .prompt-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 12px;
    }

    #question {
      font-size: clamp(1.55rem, 6.4vw, 2.2rem);
      font-weight: 800;
      line-height: 1.22;
      letter-spacing: -0.02em;
      color: var(--ink);
      max-width: 100%;
      overflow-wrap: break-word;
      word-break: break-word;
      hyphens: auto;
      margin-bottom: 32px;
      transition: opacity .35s ease, transform .35s ease;
    }
    #question.swap { opacity: 0; transform: translateY(12px); }

    .btn-row {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }

    .btn {
      border: none;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* Ja — filled plum pill; grows / happier each question */
    #ja {
      background: var(--plum);
      color: #fff;
      font-size: var(--ja-size, 1.15rem);
      padding: calc(var(--ja-pad, 15px)) calc(var(--ja-pad, 15px) * 2.4);
      box-shadow: 0 12px 26px rgba(75,22,76,.32);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), font-size .3s ease, padding .3s ease, box-shadow .3s ease, background .3s ease;
      animation: jaPulse 1.7s ease-in-out infinite;
    }
    #ja:active { transform: scale(.94); }
    @keyframes jaPulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.045); }
    }

    /* Nee — label never changes; only relocates */
    #nee {
      background: #fff;
      color: var(--muted);
      border: 1.5px solid var(--line);
      font-size: 1rem;
      font-weight: 600;
      padding: 13px 28px;
      box-shadow: 0 6px 16px rgba(75,22,76,.08);
      z-index: 30;
    }

    /* Final celebration message */
    #celebrate {
      position: relative;
      z-index: 2;
      display: none;
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border-radius: 28px;
      padding: 40px 30px;
      box-shadow: 0 24px 60px var(--shadow);
      font-size: clamp(1.3rem, 5.4vw, 1.9rem);
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--ink);
      animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.85) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ============================================================
       PART 1.5 — PHOTO GALLERY (story-style, tap to advance)
       ============================================================ */
    #gallery {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(120% 90% at 50% 0%, var(--bg) 0%, var(--bg-2) 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .8s ease, transform .8s ease;
    }
    #gallery.show    { opacity: 1; pointer-events: auto; }
    #gallery.leaving { opacity: 0; transform: scale(1.04); pointer-events: none; }

    .g-hint {
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 12px;
      text-align: center;
    }

    /* segmented progress (like IG/Hinge stories) */
    .g-progress { display: flex; gap: 5px; width: 100%; max-width: 460px; margin-bottom: 12px; }
    .g-seg { flex: 1; height: 4px; border-radius: 99px; background: var(--line); overflow: hidden; }
    .g-seg > i { display: block; height: 100%; width: 0; background: var(--plum); transition: width .3s ease; }
    .g-seg.filled > i { width: 100%; }

    .g-card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border-radius: 28px;
      padding: 14px;
      box-shadow: 0 24px 60px var(--shadow);
    }
    .g-imgwrap {
      position: relative;
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      background: var(--bg-2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #g-img {
      width: 100%;
      max-height: 60vh;
      object-fit: contain;
      image-orientation: from-image;
      display: block;
      transition: opacity .3s ease;
    }
    #g-img.fading { opacity: 0; }
    .g-caption {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-align: center;
      padding: 14px 8px 4px;
      min-height: 1.5em;
    }

    .g-controls { display: flex; align-items: center; gap: 12px; margin-top: 18px; }
    .g-back {
      background: #fff;
      border: 1.5px solid var(--line);
      color: var(--muted);
      border-radius: 999px;
      padding: 12px 20px;
      font-weight: 600;
      font-size: .95rem;
      font-family: inherit;
      cursor: pointer;
      visibility: hidden;
    }
    .g-next {
      background: var(--plum);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 30px;
      font-weight: 700;
      font-size: 1.05rem;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(75,22,76,.32);
      transition: transform .2s ease;
    }
    .g-next:active { transform: scale(.95); }

    /* ============================================================
       PART 2 — MAP
       ============================================================ */
    #map-section {
      position: fixed;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity .9s ease;
      z-index: 5;
    }
    #map-section.show { opacity: 1; pointer-events: auto; }

    #map { position: absolute; inset: 0; background: #aadaff; }

    .map-title {
      position: absolute;
      top: calc(14px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      text-align: center;
      padding: 11px 22px;
      border-radius: 999px;
      font-size: clamp(1rem, 4.4vw, 1.25rem);
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--plum);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(75,22,76,.18);
      white-space: nowrap;
      pointer-events: none;
    }

    /* numbered custom markers */
    .pin {
      position: relative;

  /* ==========================================================================
     EDITABLE DATA — verander hier de vragen en de stops

  // De swipe-deck — eerst Freek, dan Sijf. Swipe naar rechts (of tik op ♥) = like.

    { src: "images/date2_sangria.jpeg", caption: "Date twee — veel sangria 🍷" },

  // Fietsroute. Volgorde = fietsvolgorde; de laatste stop is het diner.
  const stops = [
    {
      name: "Café Cook",

      emoji: "☕",
      note: "Onze eerste date. Waar de wijntjes vielen, er veel gelachen werd en we rondgedraaid zijn op het fietsje.",

    },
    {
      name: "Bar Kosta",
      coords: [52.3579573, 4.8556117],

    },
    {
      name: "Irish Pub O'Donnell's",
      coords: [52.3566912, 4.8908977],

      note: "Date drie. Geen goeie tent — we hadden een ander plan, maar eindigden hier. Limoncello spritz met Freek, adhd-tests, de hele rambam. En weer eindigen bij de Mac.",
      photo: ""
    },
    {
      name: "Door 74",
      coords: [52.3659406, 4.8935964],
      emoji: "🍸",
      note: "Geheime plek ;)",
      photo: ""
    },
    {
      name: "Eetcafé Wijmpje Beukers",
      coords: [52.3515637, 4.8954069],

    }
  ];

  /* ==========================================================================
     PART 1 LOGIC
     ========================================================================== */
  const quiz      = document.getElementById('quiz');
  const qEl       = document.getElementById('question');
  const ja        = document.getElementById('ja');
  const nee       = document.getElementById('nee');
  const celebrate = document.getElementById('celebrate');
  const dotsEl    = document.getElementById('dots');

  let current = 0;

  // --- progress dots (Hinge-style) ---
  (function buildDots() {
    questions.forEach(() => {
      const d = document.createElement('div');
      d.className = 'dot';
      dotsEl.appendChild(d);
    });
  })();

  function renderDots() {
    [...dotsEl.children].forEach((d, i) => {
      d.classList.toggle('done', i < current);
      d.classList.toggle('active', i === current);
    });
  }

  // --- floating hearts (subtle) ---
  (function spawnHearts() {
    const layer = document.getElementById('hearts');
    const symbols = ['💜','🤍','✨','💜','🤍','✨'];
    const COUNT = 16;
    for (let i = 0; i < COUNT; i++) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = symbols[i % symbols.length];
      h.style.left = (Math.random() * 100) + 'vw';
      h.style.fontSize = (16 + Math.random() * 26) + 'px';
      h.style.animationDuration = (7 + Math.random() * 8) + 's';
      h.style.animationDelay = (-Math.random() * 12) + 's';
      layer.appendChild(h);
    }
  })();

  function renderQuestion() {
    const q = questions[current];

    // swap-out animation, then update text
    qEl.classList.add('swap');
    setTimeout(() => {
      qEl.textContent = q.text;
      qEl.classList.remove('swap');
    }, 200);

    renderDots();

    // Ja grows / gets happier each question
    const grow = current; // 0,1,2
    ja.style.setProperty('--ja-size', (1.15 + grow * 0.3) + 'rem');
    ja.style.setProperty('--ja-pad',  (15 + grow * 5) + 'px');

    resetNee();
  }

  // Put Nee back in the normal flow (inline), label unchanged.
  function resetNee() {
    nee.style.position = 'static';
    nee.style.transition = 'none';
    nee.style.left = '';
    nee.style.top = '';
    nee.style.margin = '';
    nee.style.transform = '';
  }

  // rect overlap test with padding, so Nee never sits on/near Ja
  function overlapsJa(x, y, w, h) {
    const r = ja.getBoundingClientRect();
    const pad = 24;
    return !(x + w < r.left - pad ||
             x > r.right + pad ||
             y + h < r.top - pad ||
             y > r.bottom + pad);
  }

  // random in-viewport position that avoids Ja
  function randomPos(w, h) {
    const m = 10;
    const maxX = window.innerWidth  - w - m;
    const maxY = window.innerHeight - h - m;
    for (let i = 0; i < 80; i++) {
      const x = m + Math.random() * (maxX - m);
      const y = m + Math.random() * (maxY - m);
      if (!overlapsJa(x, y, w, h)) return { x, y };
    }
    return { x: m, y: m }; // fallback (corner, away from centered Ja)
  }

  // glide: run AWAY from the tap point
  function awayFrom(px, py, w, h) {
    const cx = parseFloat(nee.style.left) + w / 2;
    const cy = parseFloat(nee.style.top)  + h / 2;
    let dx = cx - px, dy = cy - py;
    let len = Math.hypot(dx, dy) || 1;
    dx /= len; dy /= len;
    const dist = Math.max(window.innerWidth, window.innerHeight) * 0.55;
    const m = 10;
    let nx = cx + dx * dist - w / 2;
    let ny = cy + dy * dist - h / 2;
    nx = Math.max(m, Math.min(nx, window.innerWidth  - w - m));
    ny = Math.max(m, Math.min(ny, window.innerHeight - h - m));
    if (overlapsJa(nx, ny, w, h)) return randomPos(w, h);
    return { x: nx, y: ny };
  }

  // Make Nee fixed (capturing its current spot) the first time it moves
  function ensureFixed() {
    if (nee.style.position !== 'fixed') {
      const r = nee.getBoundingClientRect();
      nee.style.margin = '0';
      nee.style.position = 'fixed';
      nee.style.left = r.left + 'px';
      nee.style.top  = r.top + 'px';
    }
  }

  // Nee never advances — it only relocates. pointerdown = instant on touch+mouse.
  function moveNee(e) {
    e.preventDefault();
    e.stopPropagation();

    ensureFixed();
    const w = nee.offsetWidth, h = nee.offsetHeight;
    const mode = questions[current].nee;

    let pos;
    if (mode === 'glide') {
      nee.style.transition = 'left .55s ease, top .55s ease';
      pos = awayFrom(e.clientX ?? 0, e.clientY ?? 0, w, h);
    } else {
      nee.style.transition = 'none';        // teleport + erratic: instant jump
      pos = randomPos(w, h);
    }

    nee.style.left = pos.x + 'px';
    nee.style.top  = pos.y + 'px';

    if (mode === 'erratic') {
      nee.animate(
        [{ transform: 'scale(1)' }, { transform: 'scale(1.35) rotate(-6deg)' }, { transform: 'scale(1)' }],
        { duration: 260, easing: 'ease-out' }
      );
    }
  }

  // Use pointerdown so it reacts instantly on mouse AND touch.
  nee.addEventListener('pointerdown', moveNee);
  // Belt-and-braces: block any other activation path.
  nee.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); });
  nee.addEventListener('keydown', (e) => e.preventDefault());

  // Ja: the only way forward.
  ja.addEventListener('click', () => {
    current++;
    if (current < questions.length) {
      renderQuestion();
    } else {
      finish();
    }
  });

    resetNee();
    nee.style.display = 'none';

  }

     ========================================================================== */
  const gWrap    = document.getElementById('g-imgwrap');
  const gImg     = document.getElementById('g-img');
  const gCap     = document.getElementById('g-caption');
  const gProg    = document.getElementById('g-progress');
  const gBack    = document.getElementById('g-back');
  const gNext    = document.getElementById('g-next');
  let gIndex = 0;

  function startGallery() {
    // build progress segments + preload images
    gallery.forEach(() => {
      const seg = document.createElement('div');

  function showPhoto(i, instant) {
    gIndex = i;

    const apply = () => {
      gImg.src = p.src;
      gImg.alt = p.caption || '';
      gCap.textContent = p.caption || '';

    gNext.textContent = (i === gallery.length - 1) ? 'Naar onze route 🚲' : 'Volgende →';

  function nextPhoto() {
    if (gIndex < gallery.length - 1) {
      showPhoto(gIndex + 1, false);

    }

  function prevPhoto() {
    if (gIndex > 0) showPhoto(gIndex - 1, false);

      if (Date.now() < end) requestAnimationFrame(frame);

  /* ==========================================================================

    showProfilePhoto(0);

    const p = profiles[personIndex];
    phIndex = (i + p.photos.length) % p.photos.length;

  phCard.addEventListener('pointerdown', (e) => {
    dragging = true; moved = false;
    startX = e.clientX; startY = e.clientY; dx = 0; dy = 0;
    phCard.style.transition = 'none';
    try { phCard.setPointerCapture(e.pointerId); } catch (_) {}
  });
  phCard.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    dx = e.clientX - startX; dy = e.clientY - startY;
    if (Math.abs(dx) > 6 || Math.abs(dy) > 6) moved = true;
    phCard.style.transform = `translate(${dx}px, ${dy * 0.25}px) rotate(${dx * 0.06}deg)`;
    stampLike.style.opacity = dx > 18 ? Math.min(dx / THRESH, 1) : 0;
    stampNope.style.opacity = dx < -18 ? Math.min(-dx / THRESH, 1) : 0;
  });
  phCard.addEventListener('pointerup', (e) => {
    if (!dragging) return;
    dragging = false;
    phCard.style.transition = 'transform .35s cubic-bezier(.2,.8,.2,1)';

    if (!moved) {                                  // it was a tap → switch photo
      const r = phCard.getBoundingClientRect();
      showProfilePhoto((e.clientX - r.left) < r.width * 0.35 ? phIndex - 1 : phIndex + 1);
      resetCard();
      return;
    }
    if (dx > THRESH) { likeMe(); return; }         // swiped right → like

  // Build every element ONCE but keep them detached; they're appended one by one
  // during the reveal so the scroll grows naturally and follows the newest message.

  function buildChat() {

      let el, incoming = false, isMe = false, isDate = false;

  const sleep = (ms) => new Promise(res => setTimeout(res, ms));

  let chatRevealed = false;

    if (chatRevealed) return;
    chatRevealed = true;

    let prevSender = null;   // 'her' | 'me'
    for (const item of chatEls) {
      if (item.incoming) {
        // her message: show a "typing…" bubble first (longer when she just started replying)
        const changed = prevSender !== 'her';
        const typing = document.createElement('div');
        typing.className = 'chat-typing show';
        typing.innerHTML = '<i></i><i></i><i></i>';
        chatScroll.appendChild(typing);
        stickBottom();
        await sleep(changed ? 1500 : 950);
        typing.remove();
      } else if (item.isMe) {
        await sleep(prevSender !== 'me' ? 1000 : 650);
      } else if (item.isDate) {
        await sleep(700);
      } else {
        await sleep(950);   // prompt, system, hint, continue button
      }

      chatScroll.appendChild(item.el);   // append only now → scroll grows with content
      void item.el.offsetHeight;          // force reflow so the .in transition plays
      item.el.classList.add('in');
      stickBottom();
      if (item.incoming) prevSender = 'her';
      else if (item.isMe) prevSender = 'me';
      await sleep(220);
    }

  /* ==========================================================================
     PART 2 LOGIC — Leaflet map driven entirely by `stops`
     ========================================================================== */
  function initMap() {
    if (window._map) return;

    const map = L.map('map', { zoomControl: true, scrollWheelZoom: true });
    window._map = map;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const latlngs = stops.map(s => s.coords);

    // route line
    L.polyline(latlngs, {
      color: '#4B164C',
      weight: 5,
      opacity: 0.85,
      dashArray: '1, 10',
      lineCap: 'round'
    }).addTo(map);

    // markers
    stops.forEach((s, i) => {
      const num = i + 1;
      const isResto = !!s.isRestaurant;

      const html = isResto
        ? `<div class="pin resto"><span>🍽️</span></div>`
        : `<div class="pin"><span>${num}</span></div>`;

      const icon = L.divIcon({
        className: '',
        html,
        iconSize:   isResto ? [46, 46] : [38, 38],
        iconAnchor: isResto ? [23, 46] : [19, 38],
        popupAnchor: [0, isResto ? -44 : -36]
      });

      const marker = L.marker(s.coords, { icon }).addTo(map);
      marker.bindPopup(buildPopup(s, num), { maxWidth: 300, autoPanPadding: [24, 60] });
    });

    map.fitBounds(L.latLngBounds(latlngs), { padding: [50, 50] });
  }

  function buildPopup(s, num) {
    const label = s.isRestaurant ? `${s.emoji} ${s.name}` : `${num}. ${s.emoji} ${s.name}`;
    let html = `<div class="pop-title">${escapeHtml(label)}</div>`;
    html += `<div class="pop-note">${escapeHtml(s.note)}</div>`;

    if (s.photo && s.photo.trim() !== '') {
      html += `<img class="pop-img" src="${encodeURI(s.photo)}" alt="${escapeHtml(s.name)}" loading="lazy" />`;
    }

    if (s.isRestaurant) {
      html += `<div class="pop-times">`
            + `🍽️ <b>Reservering:</b> ${escapeHtml(s.reservationTime)}<br>`
            + `🚲 <b>Ik haal je op:</b> ${escapeHtml(s.pickupTime)}`
            + `</div>`;
    }
    return html;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* Nice-to-have: a small bike icon that animates once along the route. */
  function startBike() {
    const map = window._map;
    if (!map) return;

    const pts = stops.map(s => map.latLngToContainerPoint(L.latLng(s.coords)));
    // cumulative distances for constant-speed interpolation
    const segs = [];
    let total = 0;
    for (let i = 0; i < pts.length - 1; i++) {
      const d = pts[i].distanceTo(pts[i + 1]);
      segs.push(d);
      total += d;
    }
    if (total === 0) return;

    const bikeIcon = L.divIcon({ className: '', html: '<div class="bike-marker">🚲</div>', iconSize: [30, 30], iconAnchor: [15, 15] });
    const bike = L.marker(stops[0].coords, { icon: bikeIcon, interactive: false, zIndexOffset: 1000 }).addTo(map);

    const DURATION = 4200;
    let startT = null;

    function step(ts) {
      if (startT === null) startT = ts;
      const t = Math.min((ts - startT) / DURATION, 1);
      const target = t * total;

      // find current segment
      let acc = 0, seg = 0;
      while (seg < segs.length - 1 && acc + segs[seg] < target) { acc += segs[seg]; seg++; }
      const segT = segs[seg] ? (target - acc) / segs[seg] : 0;

      const a = stops[seg].coords, b = stops[seg + 1] ? stops[seg + 1].coords : a;
      const lat = a[0] + (b[0] - a[0]) * segT;
      const lng = a[1] + (b[1] - a[1]) * segT;
      bike.setLatLng([lat, lng]);

      if (t < 1) requestAnimationFrame(step);
      else setTimeout(() => map.removeLayer(bike), 800); // animate once, then remove
    }
    requestAnimationFrame(step);
  }
